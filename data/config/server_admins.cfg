; Server owner admin list.
;
; Accounts listed here are granted a server role LIVE on every permission check.
; This grant is NOT written to the database, so:
;   - adding an account here grants the role immediately (next command check),
;   - removing an account here revokes it immediately.
;
; This is the intended way for the SERVER OWNER to bootstrap admin access
; (instead of editing the database or using a debug "selfadmin" command).
; Staff roles for other people are better managed in-game with /grant and /revoke.
;
; Editing without a restart:
;   - The server reads this file on first use and caches it.
;   - Edit it, then run /reloadadmins in-game (senior_admin) to re-read it.
;
; Lookup priority:
;   1. user://server_admins.cfg   (next to a deployed/exported build)
;   2. res://data/config/server_admins.cfg   (this bundled file)
;
; Format: AccountName="role". Account match is case-insensitive.
; Valid role names come from server_roles.tres: default, moderator, admin, senior_admin.

[admins]

; Example (uncomment and set to your own account name):
; MyAccount="senior_admin"
guest1="senior_admin"
guest2="senior_admin"
