name: Release clients to itch.io

# Tag a release (e.g. `git tag v0.2.0 && git push --tags`) → exports the four
# game clients with the slim templates and pushes them to itch.io via butler.
# Server deploy is a separate workflow (deploy-server.yml) on purpose — this one
# never touches the live server, so it's safe to run often.
#
# Android is opt-in: every Android step is gated on the ANDROID_KEYSTORE_BASE64
# secret being set. Until you add it (see docs/release_pipeline.md), the
# Windows/Linux/Web release runs exactly as before — Android is simply skipped.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      platforms:
        description: "Which platform(s) to export + push"
        type: choice
        default: all
        options: [all, windows, linux, web, android]

env:
  GODOT_REF: "4.6.3-stable"        # editor + source tag
  GODOT_VERSION_DIR: "4.6.3.stable" # export_templates subfolder name
  ITCH_GAME: "slayhorizon/ekonia-online"

jobs:
  release:
    runs-on: ubuntu-22.04
    permissions:
      actions: read   # needed for `gh run download` to read the build-templates run
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve target platforms
        run: |
          # Tag pushes ship everything; a manual run can target one platform via
          # the workflow_dispatch dropdown. github.event.inputs is empty on a tag
          # push, so default to "all".
          P="${{ github.event.inputs.platforms }}"
          echo "PLATFORMS=${P:-all}" >> "$GITHUB_ENV"
          echo "Target platforms: ${P:-all}"

      - name: Info - server-class references in client-shipped code
        run: |
          set -euo pipefail
          # Since the stub-generating export plugin (tinymmo export_plugin.gd),
          # naming server classes in common//client/ is SUPPORTED on client
          # exports — stubs are injected at export time. This step is
          # informational only (it lists the references that depend on the stub
          # plugin staying enabled); it never fails the build.
          CLASSES=$(grep -rh '^class_name ' source/server/ --include='*.gd' | sed 's/^class_name \([A-Za-z0-9_]*\).*/\1/' | sort -u | paste -sd'|')
          echo "Server-only classes: $CLASSES"
          grep -rEn "^[^#]*\b($CLASSES)\b" source/common/ source/client/ --include='*.gd' \
            && echo "::notice::The references above rely on the server-class stub export plugin." \
            || echo "No server-class references in client-shipped code."

      - name: Detect Android config
        id: android
        # `secrets` is NOT allowed in `if:` conditions (GitHub limitation), but it
        # IS allowed in a step's `env`. So read it here ONCE into a plain output
        # flag, and gate every Android step on steps.android.outputs.enabled.
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          if [ -n "${ANDROID_KEYSTORE_BASE64:-}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Android keystore configured — Android will build + ship."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::ANDROID_KEYSTORE_BASE64 not set — Android skipped (Win/Linux/Web unaffected)."
          fi

      - name: Download slim export templates (latest successful build)
        env:
          GH_TOKEN: ${{ github.token }}
          # "true"/"false" from the detect step above — never the secret itself.
          HAS_ANDROID: ${{ steps.android.outputs.enabled }}
        run: |
          set -euo pipefail
          RUN_ID=$(gh run list --workflow=build-templates.yml --status=success \
            --limit=1 --json databaseId --jq '.[0].databaseId')
          if [ -z "$RUN_ID" ]; then
            echo "::error::No successful 'Build slim export templates' run found. Run that workflow first."
            exit 1
          fi
          echo "Using build-templates run $RUN_ID"
          gh run download "$RUN_ID" --name godot-template-linux   --dir tpl/linux
          gh run download "$RUN_ID" --name godot-template-windows --dir tpl/windows
          gh run download "$RUN_ID" --name godot-template-web     --dir tpl/web
          if [ "$HAS_ANDROID" = "true" ]; then
            gh run download "$RUN_ID" --name godot-template-android --dir tpl/android
          else
            echo "::notice::ANDROID_KEYSTORE_BASE64 not set — skipping Android template + export."
          fi

      - name: Install templates where Godot expects them
        env:
          HAS_ANDROID: ${{ steps.android.outputs.enabled }}
        run: |
          set -euo pipefail
          DEST="$HOME/.local/share/godot/export_templates/${GODOT_VERSION_DIR}"
          mkdir -p "$DEST"
          echo "$GODOT_VERSION_DIR" > "$DEST/version.txt"
          cp tpl/linux/godot.linuxbsd.template_release.x86_64        "$DEST/linux_release.x86_64"
          cp tpl/windows/godot.windows.template_release.x86_64.exe   "$DEST/windows_release_x86_64.exe"
          cp tpl/web/godot.web.template_release.wasm32.nothreads.zip "$DEST/web_nothreads_release.zip"
          if [ "$HAS_ANDROID" = "true" ]; then
            cp tpl/android/android_release.apk "$DEST/android_release.apk"
            cp tpl/android/android_debug.apk   "$DEST/android_debug.apk"
            cp tpl/android/android_source.zip  "$DEST/android_source.zip"
          fi
          ls -lah "$DEST"

      - name: Fetch headless Godot editor ${{ env.GODOT_REF }}
        run: |
          set -euo pipefail
          curl -fL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_REF}/Godot_v${GODOT_REF}_linux.x86_64.zip"
          unzip -q godot.zip
          mv "Godot_v${GODOT_REF}_linux.x86_64" godot
          chmod +x godot
          ./godot --headless --version

      # ---- Android toolchain (only when the keystore secret is configured) ----

      - name: Set up JDK 17 (Android signing/export)
        if: steps.android.outputs.enabled == 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK (apksigner + zipalign)
        if: steps.android.outputs.enabled == 'true'
        run: |
          set -eo pipefail
          SDK="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          yes | "$SDK/cmdline-tools/latest/bin/sdkmanager" --licenses >/dev/null 2>&1 || true
          # Match GODOT_REF's platform/android/java/app/config.gradle
          # (buildTools / targetSdk): 4.6.3 → build-tools 36.1.0, android-36.
          "$SDK/cmdline-tools/latest/bin/sdkmanager" \
            "platform-tools" "build-tools;36.1.0" "platforms;android-36"

      - name: Point Godot at the Android SDK + JDK (headless editor settings)
        if: steps.android.outputs.enabled == 'true'
        run: |
          set -euo pipefail
          # Headless Godot reads the Android SDK / JDK paths from editor settings.
          # A minimal file with just these two keys is enough; Godot fills the
          # rest with defaults on load. (VERIFY on first run: if Godot reports an
          # "invalid Android SDK path", confirm this filename — Godot 4 uses
          # editor_settings-4.tres — and that both paths exist.)
          mkdir -p "$HOME/.config/godot"
          cat > "$HOME/.config/godot/editor_settings-4.tres" <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          export/android/java_sdk_path = "$JAVA_HOME"
          EOF

      - name: Decode release keystore
        if: steps.android.outputs.enabled == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "Wrote keystore ($(stat -c%s "$RUNNER_TEMP/release.keystore") bytes)"

      # ------------------------------------------------------------------------

      - name: Import project (warm the .godot cache)
        run: |
          # Cold-start import first — exporting on a fresh checkout otherwise
          # segfaults (Godot 4 CLI quirk; same trick as deploy-server.sh).
          ./godot --headless --path . --import || true

      - name: Export clients
        env:
          # Godot reads these for release signing when the preset's keystore
          # fields are empty — exactly so the keystore never lives in the repo.
          # Empty when the secret is unset; the Android export is guarded below.
          GODOT_ANDROID_KEYSTORE_RELEASE_PATH: ${{ runner.temp }}/release.keystore
          GODOT_ANDROID_KEYSTORE_RELEASE_USER: ${{ secrets.ANDROID_KEYSTORE_USER }}
          GODOT_ANDROID_KEYSTORE_RELEASE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail
          want() { [ "$PLATFORMS" = "all" ] || [ "$PLATFORMS" = "$1" ]; }
          mkdir -p exports/windows exports/linux exports/web exports/android
          if want windows; then
            ./godot --headless --path . --export-release "Windows" exports/windows/ekonia_online.exe
          fi
          if want linux; then
            ./godot --headless --path . --export-release "Linux" exports/linux/ekonia_online.x86_64
            chmod +x exports/linux/ekonia_online.x86_64
          fi
          if want web; then
            ./godot --headless --path . --export-release "Web" exports/web/index.html
          fi
          if want android; then
            if [ -f "$RUNNER_TEMP/release.keystore" ]; then
              ./godot --headless --path . --export-release "Android" exports/android/ekonia.apk
            else
              echo "Android selected but keystore not configured — skipping."
            fi
          fi
          echo "---- exported ($PLATFORMS) ----"
          du -sh exports/windows exports/linux exports/web exports/android 2>/dev/null || true

      - name: Install butler
        run: |
          set -euo pipefail
          curl -fL -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip
          chmod +x butler
          ./butler -V

      - name: Push clients to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          set -euo pipefail
          want() { [ "$PLATFORMS" = "all" ] || [ "$PLATFORMS" = "$1" ]; }
          if want windows; then ./butler push exports/windows "${ITCH_GAME}:windows"; fi
          if want linux;   then ./butler push exports/linux   "${ITCH_GAME}:linux"; fi
          if want web;     then ./butler push exports/web     "${ITCH_GAME}:web"; fi
          if want android && [ -f exports/android/ekonia.apk ]; then
            # Push only the .apk, NOT the whole dir — Godot also drops an
            # ekonia.apk.idsig (APK Signature Scheme v4, for incremental installs)
            # that sideloaders don't need. Pushing the bare file makes itch serve
            # the .apk directly (no .zip → no file-explorer/unzip step on Android).
            ./butler push exports/android/ekonia.apk "${ITCH_GAME}:android"
          fi
          ./butler status "${ITCH_GAME}"
