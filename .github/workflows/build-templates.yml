name: Build slim export templates

# Compiles size-stripped Godot export templates for Web / Windows / Linux /
# Android and uploads them as downloadable artifacts. SLOW (~20-40 min) and
# expensive, so it runs on demand only — trigger it once now, then again only
# when you bump the Godot version. The fast per-release export workflow reuses
# these artifacts.
on:
  workflow_dispatch:

env:
  # MUST match your editor version exactly (see deploy-server.sh / Godot's About
  # dialog). The template ABI is version-locked to the editor that exports with it.
  GODOT_REF: "4.6.3-stable"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          # Desktop renders with gl_compatibility, so strip the Vulkan backend
          # (vulkan=no + use_volk=no). Windows additionally drops the D3D12
          # backend (d3d12=no) — also fixes the "D3D12 SDK missing" build error.
          - name: linux
            scons: "platform=linuxbsd target=template_release arch=x86_64 vulkan=no use_volk=no"
          - name: windows
            scons: "platform=windows target=template_release arch=x86_64 use_mingw=yes vulkan=no use_volk=no d3d12=no"
          - name: web
            scons: "platform=web target=template_release threads=no"
          # Android: arm64 only (covers essentially every phone since ~2017).
          # The generic "Compile template" step builds the RELEASE lib with this
          # line; an Android-only step then builds the debug lib and runs Godot's
          # gradle task to assemble android_release.apk / android_debug.apk /
          # android_source.zip. Add armeabi-v7a / x86_64 here + in the assemble
          # step + in the export preset if you ever need those ABIs.
          - name: android
            scons: "platform=android target=template_release arch=arm64 production=yes"
    steps:
      - name: Checkout game repo (for ci/custom.py)
        uses: actions/checkout@v4
        with:
          path: game

      - name: Clone Godot ${{ env.GODOT_REF }}
        run: git clone --depth 1 --branch "${{ env.GODOT_REF }}" https://github.com/godotengine/godot.git

      - name: Apply slim build options
        run: cp game/ci/custom.py godot/custom.py

      - name: Install SCons + Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y scons pkg-config build-essential \
            libx11-dev libxcursor-dev libxinerama-dev libgl1-mesa-dev libglu1-mesa-dev \
            libasound2-dev libpulse-dev libudev-dev libxi-dev libxrandr-dev libwayland-dev

      - name: Install MinGW + switch to posix threads (Windows cross-compile)
        if: matrix.name == 'windows'
        run: |
          sudo apt-get install -y mingw-w64
          # Godot only supports the POSIX thread model, but Ubuntu's mingw-w64
          # defaults to the win32 model. Switch both gcc and g++ to -posix.
          sudo update-alternatives --set x86_64-w64-mingw32-gcc /usr/bin/x86_64-w64-mingw32-gcc-posix
          sudo update-alternatives --set x86_64-w64-mingw32-g++ /usr/bin/x86_64-w64-mingw32-g++-posix

      - name: Set up Emscripten (Web)
        if: matrix.name == 'web'
        uses: mymindstorm/setup-emsdk@v14
        with:
          # WEB ONLY: must match the Emscripten version Godot ${{ env.GODOT_REF }}
          # was built against — pinned to EM_VERSION in Godot's own web_builds.yml
          # CI for the 4.6.3-stable tag. Bump this in lockstep when you upgrade Godot.
          version: 4.0.11

      - name: Set up JDK 17 (Android)
        if: matrix.name == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK + NDK (Android)
        if: matrix.name == 'android'
        run: |
          set -eo pipefail
          SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          if [ -z "$SDK" ] || [ ! -d "$SDK" ]; then
            echo "::error::Android SDK not found (ANDROID_SDK_ROOT/ANDROID_HOME unset)."
            exit 1
          fi
          SDKMANAGER="$SDK/cmdline-tools/latest/bin/sdkmanager"
          CFG=godot/platform/android/java/app/config.gradle
          # Godot pins these in config.gradle as `key : 'value'` (COLON + SINGLE
          # quotes; targetSdk is a bare int). Derive all three with sed so a Godot
          # bump needs no edits here, with the 4.6.3 values as fallback. (sed -E is
          # portable — the earlier grep -P assumed `key = "value"` AND needs a
          # UTF-8 locale; both bit us. The ^[[:space:]]* anchor avoids matching
          # androidTargetSdk when we want targetSdk.)
          NDK_VERSION=$(sed -nE "s/^[[:space:]]*ndkVersion[[:space:]]*[:=][[:space:]]*['\"]([^'\"]+).*/\1/p" "$CFG" 2>/dev/null | head -n1 || true)
          BUILD_TOOLS=$(sed -nE "s/^[[:space:]]*buildTools[[:space:]]*[:=][[:space:]]*['\"]([^'\"]+).*/\1/p" "$CFG" 2>/dev/null | head -n1 || true)
          TARGET_SDK=$(sed -nE "s/^[[:space:]]*targetSdk[[:space:]]*[:=][[:space:]]*([0-9]+).*/\1/p" "$CFG" 2>/dev/null | head -n1 || true)
          NDK_VERSION="${NDK_VERSION:-29.0.14206865}"
          BUILD_TOOLS="${BUILD_TOOLS:-36.1.0}"
          TARGET_SDK="${TARGET_SDK:-36}"
          echo "Godot ${GODOT_REF}: NDK $NDK_VERSION, build-tools $BUILD_TOOLS, platform android-$TARGET_SDK"
          yes | "$SDKMANAGER" --licenses >/dev/null 2>&1 || true
          "$SDKMANAGER" "platform-tools" "build-tools;$BUILD_TOOLS" "platforms;android-$TARGET_SDK" "ndk;$NDK_VERSION"
          echo "ANDROID_NDK_ROOT=$SDK/ndk/$NDK_VERSION" >> "$GITHUB_ENV"

      - name: Install Swappy frame-pacing lib (Android)
        if: matrix.name == 'android'
        working-directory: godot
        run: |
          set -eo pipefail
          # Godot 4.x REQUIRES the Swappy frame-pacing library for Android or scons
          # aborts (the exact error this fixes). This downloads + installs it into
          # thirdparty/. Fallback if this download ever fails: append `swappy=no` to
          # BOTH Android scons lines (the matrix one + the debug build below) —
          # builds, but Godot then guarantees frame-pacing stutter on Android.
          python3 misc/scripts/install_swappy_android.py

      - name: Compile template
        working-directory: godot
        run: scons ${{ matrix.scons }} -j"$(nproc)" verbose=no progress=no

      - name: Build debug lib + assemble Android templates (Android)
        if: matrix.name == 'android'
        working-directory: godot
        run: |
          set -euo pipefail
          # generateGodotTemplates packages BOTH the debug and release libs into
          # the apk/source templates, so the debug arch has to exist too.
          scons platform=android target=template_debug arch=arm64 production=yes -j"$(nproc)" verbose=no progress=no
          cd platform/android/java
          ./gradlew generateGodotTemplates
          echo "---- assembled ----"
          ls -lah ../../../bin

      - name: Stage built binaries
        if: matrix.name != 'android'
        run: |
          mkdir -p out
          # Copy only the files directly in bin/ (the template binaries). Skip the
          # obj/ build-cache subdirectory — cp without -r errors on it (exit 1)
          # even after copying the real binaries, which is what broke this before.
          find godot/bin -maxdepth 1 -type f -exec cp -v {} out/ \;
          echo "---- produced ----"
          ls -lah out

      - name: Stage Android templates (Android)
        if: matrix.name == 'android'
        run: |
          set -euo pipefail
          mkdir -p out
          # Only the three files the editor installs as Android templates — leave
          # the raw .aar / .so build outputs behind.
          cp -v godot/bin/android_source.zip  out/
          cp -v godot/bin/android_release.apk out/
          cp -v godot/bin/android_debug.apk   out/
          echo "---- produced ----"
          ls -lah out

      - name: Upload ${{ matrix.name }} template
        uses: actions/upload-artifact@v4
        with:
          name: godot-template-${{ matrix.name }}
          path: out/*
          if-no-files-found: error
          retention-days: 90
